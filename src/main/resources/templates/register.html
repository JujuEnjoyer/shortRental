<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Short Rental</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell">
    <div class="card auth-card">
        <h1>Регистрация арендодателя</h1>
        <p class="muted">После регистрации вы попадёте в кабинет настройки</p>

        <div class="error-banner" th:if="${error}" th:text="${error}">Ошибка</div>

        <form class="landlord-form" th:action="@{/register}" method="post">
            <input type="email" name="email" placeholder="Email" required autocomplete="email">
            <input type="password" name="password" placeholder="Пароль" required autocomplete="new-password">
            <input type="text" name="name" placeholder="Имя" required>
            <input type="text" name="surname" placeholder="Фамилия" required>
            <button class="btn btn-primary" type="submit">Создать аккаунт</button>
        </form>
        <p class="muted" style="margin-top:16px;">Уже есть аккаунт? <a th:href="@{/login}">Войти</a></p>
        <p class="muted"><a th:href="@{/}">На главную</a></p>
    </div>
</div>
</body>
</html>
