spring.application.name=shortRental
debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.security.rate-limit.enabled=true
app.security.rate-limit.public-per-minute=90
app.security.rate-limit.auth-per-minute=30
app.security.external-url.block-private-hosts=true
app.security.external-url.connect-timeout-ms=5000
app.security.external-url.read-timeout-ms=10000

# File storage (passport photos, PDF documents)
app.storage.dir=${APP_STORAGE_DIR:./storage}

# Public links in templates (guest form). Override in production, e.g. https://your-domain.ru
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
spring.datasource.url=jdbc:h2:mem:short-rental-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.h2.console.enabled=true

# Avito: OAuth credentials are stored per landlord in the DB (integration form). These settings only tune token endpoint / scopes / global kill-switch.
avito.enabled=true
avito.token-url=https://api.avito.ru/token
avito.api-base-url=https://api.avito.ru
avito.scope=messenger:read messenger:write
